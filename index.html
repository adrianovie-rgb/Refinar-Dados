
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oblt Cleaner - Remove 103 sem 216</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f9fa;color:#1d2d35;min-height:100vh}
.hdr{background:linear-gradient(135deg,#232f3e 0%,#37475a 100%);color:#fff;padding:18px 32px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:20px;font-weight:700}
.hdr .sub{font-size:12px;opacity:0.8}
.container{max-width:1000px;margin:0 auto;padding:24px 32px}
.bx{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.bx h3{font-size:16px;font-weight:700;color:#232f3e;margin-bottom:12px}
.drop-zone{border:3px dashed #adb5bd;border-radius:12px;padding:60px 20px;text-align:center;cursor:pointer;transition:all .3s;background:#f8f9fa}
.drop-zone:hover,.drop-zone.dragover{border-color:#ff9900;background:#fff7ed}
.drop-zone p{font-size:16px;color:#666;margin-bottom:8px}
.drop-zone small{font-size:12px;color:#999}
.btn{display:inline-block;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-success{background:#27ae60;color:#fff}.btn-success:hover{background:#1e8449}
.btn-danger{background:#e74c3c;color:#fff}.btn-danger:hover{background:#c0392b}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:16px 0}
.stat-card{background:#f8f9fa;border-radius:8px;padding:16px;text-align:center;border:1px solid #e9ecef}
.stat-card .num{font-size:28px;font-weight:800;color:#232f3e}
.stat-card .lbl{font-size:11px;color:#666;margin-top:4px}
.stat-card.removed .num{color:#e74c3c}
.stat-card.clean .num{color:#27ae60}
.hidden{display:none}
.actions{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.note{background:#fff7ed;border-left:4px solid #f97316;padding:10px 14px;margin:12px 0;font-size:12px;color:#9a3412;border-radius:0 6px 6px 0}
.error{background:#fee2e2;border-left:4px solid #e74c3c;padding:14px;margin:12px 0;font-size:13px;color:#991b1b;border-radius:0 6px 6px 0}
#log{background:#1a1a2e;color:#0f0;font-family:monospace;font-size:11px;padding:12px;border-radius:8px;max-height:200px;overflow-y:auto;margin-top:12px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="hdr">
<div><h1>Oblt Cleaner</h1><div class="sub">Remove trackings com EVENT_103 sem EVENT_216</div></div>
<div style="text-align:right"><div class="sub">v1.2</div></div>
</div>
<div class="container">
<div id="errorMsg" class="hidden">
<div class="error"><b>Erro:</b> Biblioteca nao carregou. Abra com internet pelo menos 1x.</div>
</div>
<div class="bx">
<h3>1. Carregar arquivo</h3>
<div class="drop-zone" id="dropZone">
<p>&#128194; Arraste o arquivo .xlsx aqui ou clique para selecionar</p>
<small>Formato: Oblt com colunas tracking_id e status_event</small>
</div>
<input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none">
</div>
<div class="bx hidden" id="resultBox">
<h3>2. Resultado</h3>
<div class="stats" id="stats"></div>
<div class="note" id="noteRemoved"></div>
<div class="actions">
<button class="btn btn-success" id="btnClean">&#9989; Baixar Base Limpa (.xlsx)</button>
<button class="btn btn-danger" id="btnRemoved">&#10060; Baixar Removidas (.xlsx)</button>
</div>
<div id="log"></div>
</div>
</div>
<script>
(function(){
"use strict";
var ZERO=0;
if(typeof XLSX==="undefined"){document.getElementById("errorMsg").classList.remove("hidden");return;}

var cleanData,removedData,hdrs,fName;
var dz=document.getElementById("dropZone");
var fi=document.getElementById("fileInput");

dz.onclick=function(){fi.click();};
dz.ondragover=function(e){e.preventDefault();dz.classList.add("dragover");};
dz.ondragleave=function(e){e.preventDefault();dz.classList.remove("dragover");};
dz.ondrop=function(e){
  e.preventDefault();
  dz.classList.remove("dragover");
  var f=e.dataTransfer.files;
  if(f.length>0) readF(f.item(ZERO));
};
fi.onchange=function(){if(fi.files.length>0) readF(fi.files.item(ZERO));};

document.getElementById("btnClean").onclick=function(){dlFile(cleanData,"_LIMPA");};
document.getElementById("btnRemoved").onclick=function(){dlFile(removedData,"_REMOVIDAS");};

function readF(file){
  fName=file.name.replace(/\.[^.]+$/,"");
  var r=new FileReader();
  r.onload=function(ev){run(ev.target.result);};
  r.readAsArrayBuffer(file);
}

function run(buf){
  try{
    var wb=XLSX.read(buf,{type:"array"});
    var sn=wb.SheetNames;
    var ws=wb.Sheets[sn[ZERO]];
    var all=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    if(all.length<2){alert("Arquivo vazio");return;}

    hdrs=all[ZERO];
    var rows=all.slice(1);

    var tCol=-1,eCol=-1;
    for(var i=0;i<hdrs.length;i++){
      var h=String(hdrs[i]).trim().toLowerCase();
      if(h==="tracking_id") tCol=i;
      if(h==="status_event") eCol=i;
    }
    if(tCol<0||eCol<0){alert("Colunas tracking_id / status_event nao encontradas.
Colunas: "+hdrs.join(", "));return;}

    var map={};
    for(var i=0;i<rows.length;i++){
      var tid=String(rows[i][tCol]||"").trim();
      var evt=String(rows[i][eCol]||"").trim();
      if(!tid) continue;
      if(!map[tid]) map[tid]={};
      map[tid][evt]=1;
    }

    var kill={};
    var keys=Object.keys(map);
    for(var i=0;i<keys.length;i++){
      if(map[keys[i]]["EVENT_103"] && !map[keys[i]]["EVENT_216"]) kill[keys[i]]=1;
    }

    cleanData=[];removedData=[];
    for(var i=0;i<rows.length;i++){
      var tid=String(rows[i][tCol]||"").trim();
      if(kill[tid]) removedData.push(rows[i]);
      else cleanData.push(rows[i]);
    }

    var tot=keys.length, rem=Object.keys(kill).length, limpo=tot-rem;

    document.getElementById("stats").innerHTML=
      card(tot,"Trackings total","")+
      card(rem,"Removidas","removed")+
      card(removedData.length,"Linhas removidas","removed")+
      card(limpo,"Trackings limpa","clean")+
      card(cleanData.length,"Linhas limpa","clean");

    var arr=Object.keys(kill).sort();
    document.getElementById("noteRemoved").innerHTML="<b>Removidas (103 sem 216):</b><br>"+arr.join("<br>");

    var log="[OK] "+fName+" | "+rows.length+" linhas | "+tot+" trackings
";
    log+="[>>] Filtrando 103 sem 216...
";
    log+="[!!] "+rem+" trackings ("+removedData.length+" linhas) removidas
";
    for(var i=0;i<arr.length;i++) log+="     "+arr[i]+"
";
    log+="[OK] Base limpa: "+cleanData.length+" linhas | "+limpo+" trackings";
    document.getElementById("log").textContent=log;

    document.getElementById("resultBox").classList.remove("hidden");
    dz.innerHTML="<p>&#9989; "+fName+" processado!</p><small>Clique para outro arquivo</small>";
  }catch(er){alert("Erro: "+er.message);}
}

function card(n,lbl,cls){return '<div class="stat-card '+cls+'"><div class="num">'+n+'</div><div class="lbl">'+lbl+'</div></div>';}

function dlFile(data,suffix){
  if(!data||!hdrs) return;
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet([hdrs].concat(data));
  XLSX.utils.book_append_sheet(wb,ws,"Dados");
  XLSX.writeFile(wb,fName+suffix+".xlsx");
}

})();
</script>
</body>
</html>
